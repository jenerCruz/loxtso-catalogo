name: Auto-Actualizar Catálogo LOXTSO
on:
  push:
    paths:
      - 'img/**' # Se activa solo cuando subes fotos

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Ejecutar script de actualización
        shell: bash
        run: |
          # Lee el JSON actual o crea uno nuevo
          if [ ! -f productos.json ]; then echo "[]" > productos.json; fi
          
          # Escanea la carpeta img
          for file in img/*.*; do
            filename=$(basename "$file")
            # Si el archivo no está en el JSON, lo añade
            if ! grep -q "$filename" productos.json; then
              # Limpia el nombre (quita extensión y guiones)
              clean_name=$(echo "${filename%.*}" | sed 's/-/ /g' | sed 's/_/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) lower(substr($i,2))}1')
              
              # Crea el objeto JSON (puedes ajustar el precio default)
              new_item="{\"id\": $(date +%s%N), \"name\": \"$clean_name\", \"price\": 0.0, \"category\": \"General\", \"desc\": \"Nuevo ingreso\", \"img\": \"img/$filename\", \"size\": \"normal\"}"
              
              # Inserta al inicio del array
              jq ". |= [$new_item] + ." productos.json > temp.json && mv temp.json productos.json
            fi
          done

      - name: Commit y Push de cambios
        run: |
          git config --global user.name "LOXTSO Bot"
          git config --global user.email "bot@loxtso.com"
          git add productos.json
          git commit -m "🤖 Auto-catálogo: Nuevos productos detectados" || exit 0
          git push
