
name: Auto-Actualizar Catálogo LOXTSO
on:
  push:
    paths:
      - 'img/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Procesar Imagenes
        shell: bash
        run: |
          # Crear el json si no existe
          if [ ! -s productos.json ]; then echo "[]" > productos.json; fi
          
          # Buscar imagenes y procesar
          find img -type f \( -iname "*.jpg" -o -iname "*.png" -o -iname "*.webp" -o -iname "*.jpeg" \) | while read file; do
            if ! grep -q "$file" productos.json; then
              # Generar categoria segun la subcarpeta
              category=$(dirname "$file" | sed 's/img\///g' | sed 's/\// /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2)}1')
              if [ "$category" == "img" ] || [ -z "$category" ]; then category="General"; fi

              # Generar nombre segun el archivo
              filename=$(basename "$file")
              clean_name=$(echo "${filename%.*}" | sed 's/-/ /g' | sed 's/_/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2)}1')
              
              # Crear el objeto con jq
              new_item="{\"id\": $(date +%s%N), \"name\": \"$clean_name\", \"price\": 0.00, \"category\": \"$category\", \"img\": \"$file\", \"size\": \"normal\"}"
              
              jq ". |= [$new_item] + ." productos.json > temp.json && mv temp.json productos.json
            fi
          done

      - name: Commit y Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add productos.json
          git commit -m "🤖 Producto autodetectado en carpeta" || exit 0
          git push