
name: Auto-Actualizar Catálogo LOXTSO
on:
  push:
    paths:
      - 'img/**' # Solo se activa si subes algo a la carpeta img

permissions:
  contents: write # IMPORTANTE: Permiso para que el bot pueda guardar el JSON

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar jq
        run: sudo apt-get install jq -y

      - name: Procesar Imágenes y Carpetas
        shell: bash
        run: |
          # Crear productos.json si no existe
          if [ ! -f productos.json ] || [ ! -s productos.json ]; then 
            echo "[]" > productos.json
          fi
          
          # Escaneo de imágenes en subcarpetas
          find img -type f \( -iname "*.jpg" -o -iname "*.png" -o -iname "*.webp" -o -iname "*.jpeg" \) | while read file; do
            
            # Solo añadir si no existe ya en el JSON
            if ! grep -q "$file" productos.json; then
              
              # Categoría basada en la carpeta (ej: img/tazas/anime -> Tazas Anime)
              category=$(dirname "$file" | sed 's/img\///g' | sed 's/\// /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2)}1')
              if [ "$category" == "img" ] || [ -z "$category" ]; then category="General"; fi

              # Nombre basado en el archivo
              filename=$(basename "$file")
              clean_name=$(echo "${filename%.*}" | sed 's/-/ /g' | sed 's/_/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2)}1')
              
              # Crear el objeto JSON
              new_item="{\"id\": $(date +%s%N), \"name\": \"$clean_name\", \"price\": 0.0, \"category\": \"$category\", \"desc\": \"Nuevo ingreso\", \"img\": \"$file\", \"size\": \"normal\"}"
              
              # Unir al JSON existente
              jq ". |= [$new_item] + ." productos.json > temp.json && mv temp.json productos.json
            fi
          done

      - name: Guardar cambios en el repositorio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add productos.json
          git commit -m "🤖 Catálogo: Se agregaron nuevos productos automáticamente" || echo "Sin cambios para commitear"
          git push
